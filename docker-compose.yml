services:
  log-db-conns-collector-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log-db-conns-collector-api
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Logging__FilePath=/app/logs/log-db-conns-metric-colletor.log
    volumes:
      - log-db-conns-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  log-db-conns-logs:
